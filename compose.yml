services:
  db:
    image: postgres:16
    container_name: agimtula_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agimtula_redis
    restart: always
    ports:
      - '6370:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: imranwebstudio/agimtula_server:latest
    container_name: agimtula_app
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@db:5435/db_name?schema=public

      # Seed admin user
      SUPER_ADMIN_EMAIL: admin@example.com
      SUPER_ADMIN_PASSWORD: adminpassword
      SUPER_ADMIN_USERNAME: ADMIN

      # JWT Secret
      JWT_SECRET: your_jwt_secret_key_here
    ports:
      - '${PORT}:${PORT}'
    command: pnpm run start:dev


volumes:
  db_data:
  redis_data:
