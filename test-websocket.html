<!DOCTYPE html>
<html>
<head>
    <title>IMAP Monitor WebSocket Test</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>IMAP Monitor WebSocket Test</h1>
    <div id="status">Connecting...</div>
    <div id="events"></div>

    <script>
        const socket = io('http://localhost:3000/imap-monitor', {
            transports: ['websocket', 'polling']
        });

        socket.on('connect', () => {
            document.getElementById('status').innerHTML = 
                '<span style="color: green;">✓ Connected to WebSocket</span>';
            console.log('Connected to WebSocket');
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerHTML = 
                '<span style="color: red;">✗ Disconnected from WebSocket</span>';
            console.log('Disconnected from WebSocket');
        });

        socket.on('connect_error', (error) => {
            document.getElementById('status').innerHTML = 
                '<span style="color: red;">✗ Connection Error: ' + error.message + '</span>';
            console.error('Connection error:', error);
        });

        socket.on('invoice-import', (data) => {
            console.log('Received invoice-import event:', data);
            const eventsDiv = document.getElementById('events');
            const eventDiv = document.createElement('div');
            eventDiv.style.border = '1px solid #ccc';
            eventDiv.style.padding = '10px';
            eventDiv.style.margin = '10px 0';
            eventDiv.style.backgroundColor = data.status === 'success' ? '#d4edda' : '#f8d7da';
            eventDiv.innerHTML = `
                <strong>New Invoice Import</strong><br>
                ID: ${data.id}<br>
                User: ${data.userName} (${data.userEmail})<br>
                Status: ${data.status}<br>
                Time: ${data.timestamp}
            `;
            eventsDiv.insertBefore(eventDiv, eventsDiv.firstChild);
        });
    </script>
</body>
</html>
